syntax = "proto3";

package admin_crm;

import "common.proto";

option java_multiple_files = true;

// =============================================
// USER SERVICE - Authentication & User Management
// =============================================

service UserService {
  // Authentication
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (LoginResponse);
  rpc Logout (Empty) returns (StatusResponse);
  rpc ChangePassword (ChangePasswordRequest) returns (StatusResponse);

  // User CRUD
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  rpc GetUser (IdRequest) returns (UserResponse);
  rpc ListUsers (ListFilter) returns (ListUsersResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser (IdRequest) returns (StatusResponse);

  // Profile
  rpc GetProfile (Empty) returns (UserResponse);
  rpc UpdateProfile (UpdateProfileRequest) returns (UserResponse);
}

// --- Auth Messages ---

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;  // seconds
  UserResponse user = 4;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

// --- User Messages ---

message CreateUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  optional string phone = 4;
  optional string avatar = 5;
  optional int64 team_id = 6;
  repeated int64 role_ids = 7;
}

message UpdateUserRequest {
  int64 id = 1;
  optional string name = 2;
  optional string email = 3;
  optional string phone = 4;
  optional string avatar = 5;
  optional string status = 6;  // active, inactive, suspended
  optional int64 team_id = 7;
  repeated int64 role_ids = 8;
}

message UpdateProfileRequest {
  optional string name = 1;
  optional string phone = 2;
  optional string avatar = 3;
}

message UserResponse {
  int64 id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  string avatar = 5;
  string status = 6;
  optional int64 team_id = 7;
  optional string team_name = 8;
  repeated RoleInfo roles = 9;
  string created_at = 10;
  string updated_at = 11;
}

message RoleInfo {
  int64 id = 1;
  string name = 2;
}

message ListUsersResponse {
  repeated UserResponse users = 1;
  PaginationResponse pagination = 2;
}
