syntax = "proto3";

package admin_crm;

import "common.proto";

option java_multiple_files = true;

// =============================================
// CAMPAIGN SERVICE - Ads/Marketing Management
// =============================================

service CampaignService {
  // Campaign CRUD
  rpc CreateCampaign (CreateCampaignRequest) returns (CampaignResponse);
  rpc GetCampaign (IdRequest) returns (CampaignDetailResponse);
  rpc ListCampaigns (ListFilter) returns (ListCampaignsResponse);
  rpc UpdateCampaign (UpdateCampaignRequest) returns (CampaignResponse);
  rpc DeleteCampaign (IdRequest) returns (StatusResponse);

  // Ad Groups
  rpc CreateAdGroup (CreateAdGroupRequest) returns (AdGroupResponse);
  rpc ListAdGroups (IdRequest) returns (ListAdGroupsResponse);

  // Ads
  rpc CreateAd (CreateAdRequest) returns (AdResponse);
  rpc ListAds (IdRequest) returns (ListAdsResponse);

  // Metrics
  rpc UpsertCampaignMetrics (UpsertMetricsRequest) returns (StatusResponse);
  rpc GetCampaignMetrics (CampaignMetricsRequest) returns (CampaignMetricsResponse);
}

// --- Campaign Messages ---

message CreateCampaignRequest {
  string name = 1;
  optional double budget = 2;
  optional string start_date = 3;
  optional string end_date = 4;
  string channel = 5;  // facebook, google, tiktok, youtube, other
  optional string status = 6;  // draft, active, paused, completed, archived
}

message UpdateCampaignRequest {
  int64 id = 1;
  optional string name = 2;
  optional double budget = 3;
  optional string start_date = 4;
  optional string end_date = 5;
  optional string channel = 6;
  optional string status = 7;
}

message CampaignResponse {
  int64 id = 1;
  string name = 2;
  double budget = 3;
  string start_date = 4;
  string end_date = 5;
  string channel = 6;
  string status = 7;
  int64 owner_id = 8;
  string owner_name = 9;
  string created_at = 10;
  string updated_at = 11;
}

message CampaignDetailResponse {
  CampaignResponse campaign = 1;
  repeated AdGroupResponse ad_groups = 2;
  CampaignMetricsSummary metrics_summary = 3;
}

message ListCampaignsResponse {
  repeated CampaignResponse campaigns = 1;
  PaginationResponse pagination = 2;
}

// --- Ad Group Messages ---

message CreateAdGroupRequest {
  int64 campaign_id = 1;
  string name = 2;
  optional double budget = 3;
}

message AdGroupResponse {
  int64 id = 1;
  int64 campaign_id = 2;
  string name = 3;
  double budget = 4;
  int32 ad_count = 5;
  string created_at = 6;
}

message ListAdGroupsResponse {
  repeated AdGroupResponse ad_groups = 1;
}

// --- Ad Messages ---

message CreateAdRequest {
  int64 ad_group_id = 1;
  string name = 2;
  optional string creative_url = 3;
  optional string headline = 4;
  optional string description = 5;
}

message AdResponse {
  int64 id = 1;
  int64 ad_group_id = 2;
  string name = 3;
  string creative_url = 4;
  string headline = 5;
  string description = 6;
  string created_at = 7;
}

message ListAdsResponse {
  repeated AdResponse ads = 1;
}

// --- Metrics Messages ---

message UpsertMetricsRequest {
  int64 campaign_id = 1;
  string date = 2;
  int64 impressions = 3;
  int64 clicks = 4;
  double cost = 5;
  int32 conversions = 6;
  double revenue = 7;
}

message CampaignMetricsRequest {
  int64 campaign_id = 1;
  string start_date = 2;
  string end_date = 3;
}

message CampaignMetricsResponse {
  repeated DailyCampaignMetric metrics = 1;
  CampaignMetricsSummary summary = 2;
}

message DailyCampaignMetric {
  string date = 1;
  int64 impressions = 2;
  int64 clicks = 3;
  double cost = 4;
  int32 conversions = 5;
  double revenue = 6;
  double cpc = 7;   // cost per click
  double ctr = 8;   // click-through rate
  double roas = 9;  // return on ad spend
}

message CampaignMetricsSummary {
  int64 total_impressions = 1;
  int64 total_clicks = 2;
  double total_cost = 3;
  int32 total_conversions = 4;
  double total_revenue = 5;
  double avg_cpc = 6;
  double avg_ctr = 7;
  double roas = 8;
}
